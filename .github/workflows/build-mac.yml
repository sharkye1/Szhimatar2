name: Build macOS App

on:
  workflow_dispatch:

# Отключаем ворнинг Node 20 на глобальном уровне
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Явно ставим свежую Node.js

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri App via CLI
        # Запускаем сборку напрямую через таури-клиент без создания релизов в гит
        run: npx tauri build --target aarch64-apple-darwin

      - name: Check where the files are
        # Этот шаг выведет в логи список всех собранных файлов, чтобы мы их точно нашли
        run: |
          echo "=== Ищем собранные артефакты ==="
          find src-tauri/target/aarch64-apple-darwin/release/bundle -maxdepth 3 2>/dev/null || echo "Папка не найдена"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: szhimatar-mac-build
          # Маска поиска, которая заберет всё: и .dmg, и .app из нужной папки архитектуры M1
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error